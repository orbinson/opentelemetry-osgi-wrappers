name: Release

on:
  workflow_dispatch:
    inputs:
      central:
        description: Release to Maven repository
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  release:
    name: Maven Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java with Maven repository
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
          cache: maven
          server-id: sonatype-central-portal
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Remove SNAPSHOT from version
        run: |
          find . -name "pom.xml" -exec sed -i 's#-SNAPSHOT##g' {} +
          sed -i 's#-SNAPSHOT##g' integration-tests/src/main/features/*.json

      - name: Deploy package
        if: ${{ inputs.central }}
        run: |
          mvn --batch-mode deploy --activate-profiles release \
            -DaltDeploymentRepository=sonatype-central-portal::njord: \
            -Dnjord.autoPublish \
            -Dnjord.publisher=sonatype-cp \
            -Dnjord.publisher.sonatype-cp.releaseRepositoryId=sonatype-central-portal \
            -Dnjord.publishingType=AUTOMATIC \
            -Dnjord.waitForStates=true
        env:
          MAVEN_USERNAME: ${{ secrets.SONATYPE_CENTRAL_PORTAL_TOKEN_USER }}
          MAVEN_PASSWORD: ${{ secrets.SONATYPE_CENTRAL_PORTAL_TOKEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
